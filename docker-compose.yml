version: '3.8'

services:
  # 1. Database (MySQL 8.0)
  db:
    image: mysql:8.0.36
    container_name: tads-db
    restart: always
    environment:
      - TZ=Asia/Seoul
      - MYSQL_ROOT_PASSWORD=12341234
      - MYSQL_DATABASE=tads_db
      - MYSQL_USER=tads_user
      - MYSQL_PASSWORD=1234
    ports:
      - "45678:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - tads-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # 로그 파일 하나당 최대 10MB
        max-file: "3"     # 최대 3개까지만 보관 (총 30MB 제한)

  # 2. Backend (Flask + YOLO)
  backend:
    image: hooneda/tads-backend:latest
    container_name: tads-backend
    restart: always
    environment:
      - TZ=Asia/Seoul
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file: .env
    volumes:
      - ./backend_flask/static/captures:/app/static/captures
      - ./backend_flask/learned_models:/app/learned_models
      - ./backend_flask/assets:/app/assets
      - ./backend_flask/modules/plate/test:/app/modules/plate/test
      - ./backend_flask/modules/plate/best_plates_golden:/app/modules/plate/best_plates_golden
    networks:
      - tads-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"   # 백엔드는 YOLO 추론 로그가 많으니 조금 더 넉넉히
        max-file: "3"

  # 3. Frontend (React / Vite)
  frontend:
    image: hooneda/tads-frontend:latest
    container_name: tads-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tads-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ★ Watchtower를 services 안으로 이동 완료!
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    environment:
      - DOCKER_API_VERSION=1.40 
      - WATCHTOWER_POLL_INTERVAL=60
      - TZ=Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup
    networks:
      - tads-network

networks:
  tads-network:
    driver: bridge

volumes:
  mysql_data: