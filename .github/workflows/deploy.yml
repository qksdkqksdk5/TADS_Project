name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]  # main 브랜치에 코드가 올라오면 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend_flask
        push: true
        tags: |
          hooneda/tads-backend:latest
          hooneda/tads-backend:v1.0

    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend_js
        push: true
        tags: |
          hooneda/tads-frontend:latest
          hooneda/tads-frontend:v1.0
  deploy:
      needs: build-and-push # 빌드가 성공해야 배포 시작
      runs-on: ubuntu-latest
      steps:
        - name: SSH Remote Commands
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.REMOTE_HOST }}
            username: ${{ secrets.REMOTE_USER }}
            password: ${{ secrets.REMOTE_PASSWORD }}
            port: 22
            script: |
              cd ~/TADS_Project
              git pull origin main
              docker compose pull
              docker compose up -d
              docker image prune -f # 오래된 이미지 정리